<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>World Cup 2026 Sweepstake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;
  --surface:#121829;
  --surface2:#1a2238;
  --border:rgba(255,255,255,0.08);
  --border-bright:rgba(255,255,255,0.16);
  --gold:#f0b429;
  --gold-dim:#c4911f;
  --text:#f0ede8;
  --text-mid:#9da8c0;
  --text-dim:#5a6480;
  --r:14px;--rsm:8px;
  --mum:#e05c8a;--mum-dim:#5a1e30;
  --dad:#4a9eff;--dad-dim:#0f2d54;
  --ella:#44d4a0;--ella-dim:#0d4033;
  --mia:#f5a623;--mia-dim:#4a2e05;
}
html,body{height:100%;overflow-x:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:4rem}

/* starfield */
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,0.4) 0%,transparent 100%),
  radial-gradient(1px 1px at 30% 60%,rgba(255,255,255,0.3) 0%,transparent 100%),
  radial-gradient(1px 1px at 55% 25%,rgba(255,255,255,0.4) 0%,transparent 100%),
  radial-gradient(1px 1px at 75% 75%,rgba(255,255,255,0.3) 0%,transparent 100%),
  radial-gradient(1px 1px at 90% 40%,rgba(255,255,255,0.4) 0%,transparent 100%),
  radial-gradient(1px 1px at 20% 85%,rgba(255,255,255,0.2) 0%,transparent 100%),
  radial-gradient(1px 1px at 65% 50%,rgba(255,255,255,0.3) 0%,transparent 100%);
pointer-events:none;z-index:0}

/* ── Header ── */
header{position:relative;z-index:1;background:linear-gradient(180deg,#0f1525 0%,transparent 100%);padding:1.5rem 1.25rem 1rem;text-align:center;border-bottom:1px solid var(--border)}
.trophy{font-size:2rem;margin-bottom:0.25rem;display:block;filter:drop-shadow(0 0 12px rgba(240,180,41,0.6))}
header h1{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:0.04em;line-height:1;background:linear-gradient(135deg,#f0b429,#fff 60%,#f0b429);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{font-size:0.78rem;color:var(--text-mid);margin-top:0.3rem;font-weight:300;letter-spacing:0.05em;text-transform:uppercase}
.header-status{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:0.6rem}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--text-dim)}
.sdot.live{background:#22c55e;box-shadow:0 0 6px #22c55e}
.sdot.err{background:#ef4444}
.sdot.loading{background:var(--gold);animation:pulse 1s infinite}
.stext{font-size:0.72rem;color:var(--text-dim);font-weight:300}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;background:var(--bg)}
.tab{flex:1;padding:0.85rem 0.5rem;text-align:center;font-size:0.78rem;font-weight:500;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.06em;-webkit-tap-highlight-color:transparent}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── Leaderboard ── */
.section{padding:1rem 1rem;position:relative;z-index:1}
.leaderboard{display:flex;flex-direction:column;gap:10px}
.player-card{border-radius:var(--r);border:1px solid var(--border);overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform 0.12s}
.player-card:active{transform:scale(0.985)}
.player-header{display:flex;align-items:center;gap:12px;padding:0.9rem 1rem}
.rank{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--text-dim);min-width:28px;text-align:center;line-height:1}
.rank.r1{color:var(--gold);text-shadow:0 0 12px rgba(240,180,41,0.5)}
.rank.r2{color:#c0c0c0}
.rank.r3{color:#cd7f32}
.player-info{flex:1}
.player-name{font-size:1rem;font-weight:500}
.player-sub{font-size:0.75rem;color:var(--text-mid);font-weight:300;margin-top:1px}
.player-score{text-align:right}
.score-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;line-height:1}
.score-label{font-size:0.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em}
.player-teams{padding:0 1rem 0.9rem;display:flex;flex-wrap:wrap;gap:5px}
.team-tag{font-size:0.72rem;padding:3px 8px;border-radius:20px;font-weight:400;border:1px solid transparent}
.team-tag.elim{opacity:0.35;text-decoration:line-through}
.team-tag.winner{font-weight:600;box-shadow:0 0 8px rgba(240,180,41,0.4)}
.chevron{color:var(--text-dim);font-size:0.8rem;transition:transform 0.2s}
.player-card.open .chevron{transform:rotate(180deg)}
.player-teams{display:none}
.player-card.open .player-teams{display:flex}

/* ── Draw tab ── */
.draw-not-done{text-align:center;padding:2rem 1.5rem}
.draw-not-done p{color:var(--text-mid);font-size:0.9rem;font-weight:300;line-height:1.6;margin-bottom:1.5rem}
.btn-draw{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#0a0e1a;border:none;border-radius:var(--rsm);padding:1rem 2rem;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:0.08em;cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent;transition:opacity 0.15s;box-shadow:0 4px 20px rgba(240,180,41,0.35)}
.btn-draw:active{opacity:0.85}
.btn-draw:disabled{opacity:0.4;cursor:not-allowed}

.group-block{margin-bottom:1.25rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.group-label{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:0.1em;color:var(--gold);padding:0.6rem 1rem;background:rgba(240,180,41,0.07);border-bottom:1px solid var(--border)}
.group-teams{display:flex;flex-direction:column}
.draw-team-row{display:flex;align-items:center;justify-content:space-between;padding:0.55rem 1rem;border-bottom:1px solid var(--border)}
.draw-team-row:last-child{border-bottom:none}
.draw-team-name{font-size:0.88rem;font-weight:400}
.draw-player-pill{font-size:0.7rem;font-weight:500;padding:2px 9px;border-radius:12px}

/* ── Results tab ── */
.results-intro{font-size:0.8rem;color:var(--text-mid);padding:0 0 0.75rem;font-weight:300;line-height:1.5}
.result-group{margin-bottom:1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.result-group-label{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:0.1em;color:var(--gold);padding:0.5rem 1rem;background:rgba(240,180,41,0.06);border-bottom:1px solid var(--border)}
.result-team-row{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1rem;border-bottom:1px solid var(--border)}
.result-team-row:last-child{border-bottom:none}
.result-team-left{display:flex;align-items:center;gap:8px}
.result-team-name{font-size:0.87rem}
.result-owner{font-size:0.68rem;padding:2px 7px;border-radius:10px}
.result-actions{display:flex;gap:6px}
.btn-result{padding:5px 10px;border-radius:6px;font-size:0.72rem;font-weight:500;border:1px solid;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.15s;background:none}
.btn-result.btn-won{border-color:var(--gold);color:var(--gold)}
.btn-result.btn-won.active{background:var(--gold);color:#0a0e1a}
.btn-result.btn-out{border-color:var(--text-dim);color:var(--text-dim)}
.btn-result.btn-out.active{background:var(--text-dim);color:#0a0e1a}

/* ── Winner banner ── */
.winner-banner{background:linear-gradient(135deg,rgba(240,180,41,0.15),rgba(240,180,41,0.05));border:1px solid rgba(240,180,41,0.4);border-radius:var(--r);padding:1.25rem 1rem;text-align:center;margin-bottom:1rem}
.winner-banner .trophy2{font-size:2rem;display:block;margin-bottom:0.4rem}
.winner-banner h3{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:0.06em;color:var(--gold)}
.winner-banner p{font-size:0.8rem;color:var(--text-mid);font-weight:300;margin-top:0.2rem}

/* ── Loading / error states ── */
.loading-state{text-align:center;padding:2rem;color:var(--text-dim);font-size:0.85rem;font-weight:300}
.err-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--rsm);padding:0.75rem 1rem;font-size:0.8rem;color:#fca5a5;margin-bottom:1rem;line-height:1.5}

/* ── Scoring info ── */
.scoring-info{background:var(--surface2);border-radius:var(--rsm);padding:0.75rem 1rem;margin-bottom:1rem;font-size:0.75rem;color:var(--text-mid);line-height:1.7;font-weight:300}
.scoring-info span{color:var(--gold);font-weight:500}
</style>
</head>
<body>

<header>
  <span class="trophy">🏆</span>
  <h1>World Cup 2026</h1>
  <p>Family Sweepstake &nbsp;·&nbsp; USA · Canada · Mexico</p>
  <div class="header-status">
    <div class="sdot loading" id="sdot"></div>
    <span class="stext" id="stext">Connecting…</span>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('leaderboard')">🏅 Standings</div>
  <div class="tab" onclick="showTab('draw')">🎯 The Draw</div>
  <div class="tab" onclick="showTab('results')">⚽ Results</div>
</div>

<div id="tab-leaderboard" class="section"></div>
<div id="tab-draw" class="section" style="display:none"></div>
<div id="tab-results" class="section" style="display:none"></div>

<script>
// ── Data ────────────────────────────────────────────────────────────────────
const PLAYERS = [
  {id:'mum',  name:'Mum',  color:'#e05c8a', dim:'#5a1e30'},
  {id:'dad',  name:'Dad',  color:'#4a9eff', dim:'#0f2d54'},
  {id:'ella', name:'Ella', color:'#44d4a0', dim:'#0d4033'},
  {id:'mia',  name:'Mia',  color:'#f5a623', dim:'#4a2e05'},
];

const GROUPS = {
  A:['Mexico','South Africa','Korea Republic','Czechia'],
  B:['Canada','Bosnia & Herzegovina','Qatar','Switzerland'],
  C:['Brazil','Morocco','Haiti','Scotland'],
  D:['USA','Paraguay','Australia','Türkiye'],
  E:['Germany','Curaçao','Côte d\'Ivoire','Ecuador'],
  F:['Netherlands','Japan','Sweden','Tunisia'],
  G:['Belgium','Egypt','IR Iran','New Zealand'],
  H:['Spain','Cabo Verde','Saudi Arabia','Uruguay'],
  I:['France','Senegal','Iraq','Norway'],
  J:['Argentina','Algeria','Austria','Jordan'],
  K:['Portugal','Congo DR','Uzbekistan','Colombia'],
  L:['England','Croatia','Ghana','Panama'],
};

// Scoring: points per round reached
const ROUND_POINTS = {
  group:0, r32:2, qf:4, sf:6, final:9, winner:15
};

// JSONBin config (pre-loaded)
const API_KEY = '$2a$10$U.ldNI6BBa3I4Bj9ICKIHe5B9w5VMpLWPLlAsBpptNGfKV49jTpqu';
const BIN_ID  = '6a257750f5f4af5e29c66ca7';
const BIN_BASE = 'https://api.jsonbin.io/v3';

// ── State ────────────────────────────────────────────────────────────────────
let state = {
  draw: null,        // { teamName: playerId }
  results: {},       // { teamName: 'group'|'r32'|'qf'|'sf'|'final'|'winner'|'eliminated' }
};
let currentTab = 'leaderboard';
let pollTimer = null;
let openCards = new Set();

// ── JSONBin ──────────────────────────────────────────────────────────────────
async function fetchState() {
  setStatus('loading','Syncing…');
  try {
    const r = await fetch(`${BIN_BASE}/b/${BIN_ID}/latest`,{
      headers:{'X-Master-Key':API_KEY,'X-Bin-Meta':'false'}
    });
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    if(data.sweepstake) state = data.sweepstake;
    setStatus('live','Live');
    render();
  } catch(e) {
    setStatus('err','Sync error');
  }
}

async function pushState() {
  setStatus('loading','Saving…');
  try {
    const r = await fetch(`${BIN_BASE}/b/${BIN_ID}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
      body: JSON.stringify({sweepstake: state})
    });
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    setStatus('live','Saved ✓');
    setTimeout(()=>setStatus('live','Live'),2000);
  } catch(e) {
    setStatus('err','Save failed');
  }
}

function setStatus(type, msg) {
  const d = document.getElementById('sdot');
  const t = document.getElementById('stext');
  d.className = 'sdot ' + type;
  t.textContent = msg;
}

// ── Draw logic ───────────────────────────────────────────────────────────────
function makeDraw() {
  const draw = {};
  // For each group, randomly assign 1 team to each player
  Object.values(GROUPS).forEach(teams => {
    const shuffled = [...teams].sort(() => Math.random() - 0.5);
    PLAYERS.forEach((p, i) => { draw[shuffled[i]] = p.id; });
  });
  return draw;
}

// ── Scoring ──────────────────────────────────────────────────────────────────
function calcScores() {
  const scores = {};
  PLAYERS.forEach(p => scores[p.id] = 0);
  if (!state.draw) return scores;
  Object.entries(state.draw).forEach(([team, pid]) => {
    const res = state.results[team];
    if (res && res !== 'eliminated' && ROUND_POINTS[res] !== undefined) {
      scores[pid] = (scores[pid]||0) + ROUND_POINTS[res];
    }
  });
  return scores;
}

function getPlayerTeams(playerId) {
  if (!state.draw) return [];
  return Object.entries(state.draw)
    .filter(([,pid]) => pid === playerId)
    .map(([team]) => team);
}

function teamStatus(team) {
  const r = state.results[team];
  if (!r || r === 'group') return 'active';
  if (r === 'eliminated') return 'elim';
  if (r === 'winner') return 'winner';
  return 'active';
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  renderLeaderboard();
  renderDraw();
  renderResults();
}

function renderLeaderboard() {
  const el = document.getElementById('tab-leaderboard');
  if (!state.draw) {
    el.innerHTML = `<div class="draw-not-done" style="text-align:center;padding:2rem 1.5rem">
      <p style="color:var(--text-mid);font-size:0.9rem;font-weight:300;line-height:1.6;margin-bottom:1rem">The draw hasn't been done yet.<br>Head to the <strong style="color:var(--text)">Draw tab</strong> to get started.</p>
    </div>`;
    return;
  }

  const scores = calcScores();
  const ranked = [...PLAYERS].sort((a,b) => scores[b.id] - scores[a.id]);
  const winnerTeam = Object.entries(state.results).find(([,v])=>v==='winner');
  const winnerPlayer = winnerTeam ? PLAYERS.find(p=>p.id===state.draw[winnerTeam[0]]) : null;

  let html = '';

  if (winnerPlayer) {
    html += `<div class="winner-banner">
      <span class="trophy2">🏆</span>
      <h3>${winnerPlayer.name} wins!</h3>
      <p>${winnerTeam[0]} are World Champions</p>
    </div>`;
  }

  html += `<div class="scoring-info">
    Points: <span>Group exit = 0</span> · <span>Round of 32 = 2</span> · <span>QF = 4</span> · <span>SF = 6</span> · <span>Final = 9</span> · <span>Winner = 15</span>
  </div>`;

  html += `<div class="leaderboard">`;
  ranked.forEach((p, i) => {
    const teams = getPlayerTeams(p.id);
    const rankClass = i===0?'r1':i===1?'r2':i===2?'r3':'';
    const isOpen = openCards.has(p.id);
    const teamTags = teams.map(t => {
      const st = teamStatus(t);
      return `<span class="team-tag ${st}" style="background:${p.dim};color:${p.color};border-color:${p.color}33">${t}</span>`;
    }).join('');
    html += `<div class="player-card ${isOpen?'open':''}" onclick="toggleCard('${p.id}')" style="background:${p.dim}22;border-color:${p.color}33">
      <div class="player-header">
        <div class="rank ${rankClass}">${i+1}</div>
        <div class="player-info">
          <div class="player-name" style="color:${p.color}">${p.name}</div>
          <div class="player-sub">${teams.length} teams · tap to expand</div>
        </div>
        <div class="player-score">
          <div class="score-num" style="color:${p.color}">${scores[p.id]}</div>
          <div class="score-label">pts</div>
        </div>
        <span class="chevron">▾</span>
      </div>
      <div class="player-teams">${teamTags}</div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

function toggleCard(pid) {
  if (openCards.has(pid)) openCards.delete(pid);
  else openCards.add(pid);
  renderLeaderboard();
}

function renderDraw() {
  const el = document.getElementById('tab-draw');
  // Draw is always set (fixed)

  let html = '';
  Object.entries(GROUPS).forEach(([grp, teams]) => {
    html += `<div class="group-block"><div class="group-label">GROUP ${grp}</div><div class="group-teams">`;
    teams.forEach(team => {
      const pid = state.draw[team];
      const p = PLAYERS.find(x=>x.id===pid);
      html += `<div class="draw-team-row">
        <span class="draw-team-name">${team}</span>
        <span class="draw-player-pill" style="background:${p.dim};color:${p.color}">${p.name}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  el.innerHTML = html;
}

function renderResults() {
  const el = document.getElementById('tab-results');
  if (!state.draw) {
    el.innerHTML = `<div class="loading-state">Complete the draw first to update results.</div>`;
    return;
  }

  const rounds = [
    {key:'r32',   label:'Round of 32'},
    {key:'qf',    label:'Quarter-Final'},
    {key:'sf',    label:'Semi-Final'},
    {key:'final', label:'Final'},
    {key:'winner',label:'🏆 Winner'},
  ];

  let html = `<div class="results-intro">Mark how far each team progresses. Points update automatically for everyone.</div>`;

  Object.entries(GROUPS).forEach(([grp, teams]) => {
    html += `<div class="result-group"><div class="result-group-label">GROUP ${grp}</div>`;
    teams.forEach(team => {
      const pid = state.draw[team];
      const p = PLAYERS.find(x=>x.id===pid);
      const cur = state.results[team] || 'group';
      const isElim = cur === 'eliminated';

      html += `<div class="result-team-row">
        <div class="result-team-left">
          <span class="result-owner" style="background:${p.dim};color:${p.color}">${p.name}</span>
          <span class="result-team-name" style="${isElim?'opacity:0.4;text-decoration:line-through':''}">${team}</span>
        </div>
        <div class="result-actions">
          <button class="btn-result btn-out ${isElim?'active':''}" onclick="setResult('${team}','${isElim?'group':'eliminated'}')">Out</button>
          ${rounds.map(r=>`<button class="btn-result btn-won ${cur===r.key?'active':''}" onclick="setResult('${team}','${r.key}')">${r.label.split(' ')[0]==='🏆'?'🏆':r.label.replace('Quarter-Final','QF').replace('Semi-Final','SF').replace('Round of 32','R32')}</button>`).join('')}
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  el.innerHTML = html;
}

// ── Actions ──────────────────────────────────────────────────────────────────
function doDraw() {
  // Draw is permanently fixed — this function is disabled
}

function setResult(team, result) {
  if (result === 'group') {
    delete state.results[team];
  } else {
    state.results[team] = result;
  }
  saveResults(state.results);
  setStatus('live', 'Saved ✓');
  setTimeout(() => setStatus('live', 'Ready'), 1500);
  renderResults();
  renderLeaderboard();
}

function showTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const names=['leaderboard','draw','results'];
    t.classList.toggle('active', names[i]===name);
  });
  document.getElementById('tab-leaderboard').style.display = name==='leaderboard'?'block':'none';
  document.getElementById('tab-draw').style.display        = name==='draw'?'block':'none';
  document.getElementById('tab-results').style.display     = name==='results'?'block':'none';
}

// ── Boot ─────────────────────────────────────────────────────────────────────
const FIXED_DRAW = {
  'Czechia':'mum','Canada':'mum','Morocco':'mum','USA':'mum',
  "Côte d'Ivoire":'mum','Tunisia':'mum','Egypt':'mum','Cabo Verde':'mum',
  'France':'mum','Jordan':'mum','Portugal':'mum','Ghana':'mum',
  'Mexico':'dad','Bosnia & Herzegovina':'dad','Brazil':'dad','Paraguay':'dad',
  'Germany':'dad','Japan':'dad','New Zealand':'dad','Uruguay':'dad',
  'Senegal':'dad','Algeria':'dad','Colombia':'dad','Croatia':'dad',
  'South Africa':'ella','Switzerland':'ella','Scotland':'ella','Australia':'ella',
  'Curaçao':'ella','Netherlands':'ella','Belgium':'ella','Saudi Arabia':'ella',
  'Iraq':'ella','Argentina':'ella','Congo DR':'ella','Panama':'ella',
  'Korea Republic':'mia','Qatar':'mia','Haiti':'mia','Türkiye':'mia',
  'Ecuador':'mia','Sweden':'mia','IR Iran':'mia','Spain':'mia',
  'Norway':'mia','Austria':'mia','Uzbekistan':'mia','England':'mia',
};

const LS_RESULTS = 'sweepstake-results-v1';

function loadResults() {
  try { return JSON.parse(localStorage.getItem(LS_RESULTS) || '{}'); } catch(e) { return {}; }
}
function saveResults(results) {
  localStorage.setItem(LS_RESULTS, JSON.stringify(results));
}

(function boot() {
  state.draw = FIXED_DRAW;
  state.results = loadResults();
  setStatus('live', 'Ready');
  render();
})();
</script>
</body>
</html>
